<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danny's Mandingo</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --red: #ff1a1a;
            --yellow: #ffcc00;
            --dark: #0f0f0f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif
        }

        body {
            background: var(--dark);
            color: #fff
        }

        /* NAV */
        header {
            position: fixed;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(14px);
            z-index: 1000;
            transition: .3s;
        }

        header.scrolled {
            background: rgba(0, 0, 0, 0.9)
        }

        .logo-img {
            height: 50px
        }

        nav a {
            color: #fff;
            margin-left: 25px;
            text-decoration: none
        }

        /* HERO */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center
        }

        .hero video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.95), rgba(0, 0, 0, 0.4));
            z-index: -1;
        }

        .hero h2 {
            font-size: 4rem;
            color: var(--yellow)
        }

        .btn {
            background: linear-gradient(45deg, var(--red), #ff6600);
            padding: 12px 25px;
            border-radius: 30px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        /* SECTIONS */
        section {
            padding: 100px 40px
        }

        .section-title {
            text-align: center;
            margin-bottom: 60px;
            font-size: 2.5rem;
            color: var(--yellow)
        }

        /* MENU */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .card {
            background: #1a1a1a;
            border-radius: 20px;
            overflow: hidden
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover
        }

        .card-content {
            padding: 20px
        }

        .price {
            color: var(--yellow)
        }

        /* CART */
        #cart-box {
            position: fixed;
            left: 20px;
            bottom: 20px;
            background: #1a1a1a;
            padding: 15px;
            border-radius: 15px;
            width: 250px;
            z-index: 3000;
        }

        /* CONTACT */
        .contact {
            text-align: center
        }

        .socials img {
            width: 35px;
            margin: 10px;
            transition: .3s;
        }

        .socials img:hover {
            transform: scale(1.2);
        }

        /* MAP */
        .map {
            margin-top: 40px;
            border-radius: 20px;
            overflow: hidden;
        }

        /* FLOAT */
        .float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #25D366;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 28px;
            text-decoration: none;
        }

        /* POPUP */
        .popup-side {
            position: fixed;
            right: 20px;
            bottom: 100px;
            z-index: 2000
        }

        .popup-content {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            max-width: 220px;
            position: relative;
        }

        .popup-content h3 {
            margin-bottom: 8px
        }

        .popup-content p {
            margin-bottom: 15px
        }

        .close-btn {
            position: absolute;
            top: 5px;
            right: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <header id="header">
        <img src="logo.png" class="logo-img">
        <nav>
            <a href="#menu">Menú</a>
            <a href="#contacto">Contacto</a>
        </nav>
    </header>

    <section class="hero">
        <video autoplay muted loop>
            <source src="video.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
        <div>
            <h2>🔥 El mejor sabor en Manta</h2>
            <a href="#menu" class="btn">Ver Menú</a>
        </div>
    </section>

    <section id="menu">
        <h2 class="section-title">Nuestro Menú</h2>

        <div class="menu-grid">

            <div class="card">
                <img src="food1.jpg">
                <div class="card-content">
                    <h3>Hamburguesa</h3>
                    <p class="price">$5</p>
                    <button class="btn" onclick="addToCart('Hamburguesa',5)">Agregar</button>
                </div>
            </div>

            <div class="card">
                <img src="food2.jpg">
                <div class="card-content">
                    <h3>Pizza</h3>
                    <p class="price">$8</p>
                    <button class="btn" onclick="addToCart('Pizza',8)">Agregar</button>
                </div>
            </div>

            <div class="card">
                <img src="food3.jpg">
                <div class="card-content">
                    <h3>Hot Dog</h3>
                    <p class="price">$4</p>
                    <button class="btn" onclick="addToCart('Hot Dog',4)">Agregar</button>
                </div>
            </div>

            <div class="card">
                <img src="food4.jpg">
                <div class="card-content">
                    <h3>Batido</h3>
                    <p class="price">$3</p>
                    <button class="btn" onclick="addToCart('Batido',3)">Agregar</button>
                </div>
            </div>

        </div>
    </section>

    <!-- CART -->
    <div id="cart-box">
        <h3 style="color:#ffcc00;">🛒 Pedido</h3>
        <div id="cart-items"></div>
        <p id="cart-total">Total: $0</p>
        <button onclick="sendWhatsApp()" class="btn" style="margin-top:10px;width:100%;">Enviar Pedido</button>
    </div>

    <!-- CONTACT -->
    <section id="contacto" class="contact">
        <h2 class="section-title">Contáctanos</h2>

        <p>📍 TU DIRECCIÓN AQUÍ</p>
        <p>📱 TU NÚMERO AQUÍ</p>

        <!-- SOCIALS -->
        <div class="socials">
            <a href="#"><img src="whatsapp.png"></a>
            <a href="#"><img src="instagram.png"></a>
            <a href="#"><img src="facebook.png"></a>
        </div>

        <!-- MAP -->
        <div class="map">
            <iframe src="https://maps.google.com/maps?q=Manta&t=&z=13&ie=UTF8&iwloc=&output=embed" width="100%"
                height="300" style="border:0"></iframe>
        </div>

    </section>

    <a href="https://wa.me/TUNUMERO" class="float">💬</a>

    <!-- POPUP -->
    <div id="popup" class="popup-side">
        <div class="popup-content">
            <h3>🍔 ¿Ordenar?</h3>
            <p>Haz tu pedido por WhatsApp</p>

            <!-- FIXED SPACING -->
            <a href="https://wa.me/TUNUMERO" class="btn" style="margin-top:10px;display:inline-block;">
                Ordenar
            </a>

            <span class="close-btn" onclick="closePopup()">✖</span>
        </div>
    </div>

    <script>

        function closePopup() {
            document.getElementById('popup').style.display = 'none';
        }

        window.addEventListener('scroll', () => {
            const header = document.getElementById('header');
            if (window.scrollY > 50) { header.classList.add('scrolled') }
            else { header.classList.remove('scrolled') }
        });

        /* CART */
        let cart = [];

        function addToCart(name, price) {
            cart.push({ name, price });
            updateCart();
        }

        function updateCart() {
            let items = document.getElementById('cart-items');
            let total = 0;

            items.innerHTML = '';

            cart.forEach(item => {
                items.innerHTML += `<div>${item.name} - $${item.price}</div>`;
                total += item.price;
            });

            document.getElementById('cart-total').innerText = 'Total: $' + total;
        }

        function sendWhatsApp() {

            let number = "TUNUMERO";

            let message = "Hola, quiero ordenar:%0A";
            let total = 0;

            cart.forEach(item => {
                message += `- ${item.name} ($${item.price})%0A`;
                total += item.price;
            });

            message += `Total: $${total}`;

            window.open(`https://wa.me/${number}?text=${message}`, '_blank');
        }

    </script>

</body>

</html>
